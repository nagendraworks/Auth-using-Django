<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Distributor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

    <!-- Top Navigation Bar -->
    <nav class="bg-blue-600 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white font-bold text-xl tracking-wider">DISTRIBUTOR <span class="font-light text-blue-200">DASHBOARD</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-blue-700 rounded-full px-4 py-1.5">
                        <span class="text-white text-sm">Hello, <strong>{{ request.user.username }}</strong></span>
                    </div>
                    <a href="/logout/" class="text-blue-100 hover:text-white hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-8">Distributor Dashboard</h1>
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-blue-500">
                <h3 class="text-slate-500 text-sm font-semibold uppercase tracking-wider">My Active Orders</h3>
                <p class="text-4xl font-bold text-slate-800 mt-2">14</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-yellow-400">
                <h3 class="text-slate-500 text-sm font-semibold uppercase tracking-wider">Pending Deliveries</h3>
                <p class="text-4xl font-bold text-slate-800 mt-2">3</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-green-500">
                <h3 class="text-slate-500 text-sm font-semibold uppercase tracking-wider">Monthly Revenue</h3>
                <p class="text-4xl font-bold text-slate-800 mt-2">$12,450</p>
            </div>
        </div>

        <!-- Recent Orders Table -->
        <div class="bg-white shadow-sm rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 bg-slate-50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Shipments</h2>
            </div>
            <div class="p-6 text-center text-slate-500 py-12">
                <svg class="mx-auto h-12 w-12 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <p>No new shipments to display this week.</p>
            </div>
        </div>
    </main>

</body>
</html>
