<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
        <div class="h-16 w-16 bg-green-100 rounded-full mx-auto flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-800">Email Sent!</h2>
        <p class="text-gray-500 text-sm mt-2 mb-8">Please check your email inbox and enter the 6-digit security code below.</p>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <input type="text" name="otp" required placeholder="• • • • • •" class="text-center text-2xl tracking-[0.5em] w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-300 focus:border-green-500 focus:bg-white focus:ring-2 focus:ring-green-200 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                Verify Code
            </button>
        </form>
    </div>

</body>
</html>
